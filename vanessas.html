<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WAR WORLD — VANESSA'S PAINTBALL</title>
  <style>
    :root {
      --ink: #0d0f0c; --bone: #d8d4c8; --amber: #e8a33d; --dim: #8a867a;
      --line: #3a382f; --paint: #e8632c;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; overflow: hidden; background: var(--ink); }
    body { font-family: 'Courier New', ui-monospace, monospace; color: var(--bone); }
    canvas { display: block; }
    .hud { position: fixed; left: 0; right: 0; pointer-events: none; z-index: 5; }
    #top { top: 0; padding: 14px 18px; display: flex; justify-content: space-between; align-items: baseline; }
    #top h1 { font-size: 15px; letter-spacing: 0.22em; font-weight: 700; }
    #top h1 b { color: var(--paint); }
    #top .sub { font-size: 11px; color: var(--dim); letter-spacing: 0.12em; }
    /* the booth card — slides in when a booth holds the floor */
    #card {
      position: fixed; left: 18px; bottom: 86px; z-index: 6; width: 300px;
      border: 1px solid var(--line); border-top: 2px solid var(--amber);
      background: rgba(13,15,12,0.88); padding: 12px 16px;
      transform: translateX(-120%); transition: transform 0.28s ease;
      pointer-events: none;
    }
    #card.on { transform: none; }
    #card .tag { color: var(--amber); font-size: 11px; letter-spacing: 0.2em; }
    #card .nm { font-size: 17px; letter-spacing: 0.06em; margin: 3px 0 6px; font-weight: 700; }
    #card .pitch { font-size: 11px; color: var(--dim); line-height: 1.5; margin-bottom: 8px; }
    #card .row { display: flex; justify-content: space-between; font-size: 11px; padding: 2px 0; border-top: 1px dotted var(--line); }
    #card .row span { color: var(--dim); letter-spacing: 0.1em; }
    #card .row b { letter-spacing: 0.05em; }
    /* Vanessa's word — a chip that floats by the counter */
    #vanessa-says {
      position: fixed; right: 20px; bottom: 96px; z-index: 6; max-width: 300px;
      border: 1px solid var(--line); border-left: 3px solid var(--paint);
      background: rgba(13,15,12,0.88); padding: 9px 13px;
      font-size: 12px; line-height: 1.45; font-style: italic;
      opacity: 0; transition: opacity 0.3s; pointer-events: none;
    }
    #vanessa-says.on { opacity: 1; }
    #vanessa-says .who { color: var(--paint); font-style: normal; font-size: 10px; letter-spacing: 0.22em; display: block; margin-bottom: 3px; }
    /* the bar — booths, the take, the door */
    #bar { bottom: 0; display: flex; justify-content: center; align-items: center; gap: 8px; padding: 12px; pointer-events: auto; background: linear-gradient(transparent, rgba(13,15,12,0.92)); }
    #bar button, #bar a {
      font: 700 11px 'Courier New', monospace; letter-spacing: 0.16em; cursor: pointer;
      color: var(--bone); background: transparent; border: 1px solid var(--line);
      padding: 8px 14px; text-transform: uppercase; text-decoration: none; display: inline-block;
    }
    #bar button:hover, #bar a:hover { border-color: var(--amber); color: var(--amber); }
    #bar button.on { background: var(--amber); color: var(--ink); border-color: var(--amber); }
    #take { border-color: var(--paint) !important; color: var(--paint) !important; }
    #take:hover { background: var(--paint) !important; color: var(--ink) !important; }
    #take.taken { background: var(--paint) !important; color: var(--ink) !important; }
    #door { margin-left: 18px; opacity: 0.8; }
  </style>
</head>
<body>
  <div class="hud" id="top">
    <h1>[ <b>VANESSA'S</b> PAINTBALL ]</h1>
    <span class="sub">PRO SHOP — WALK THE BOOTHS, PICK YOUR MARKER &nbsp;·&nbsp; KEYS 1-4 · ENTER TAKES IT TO THE YARD</span>
  </div>
  <div id="card">
    <div class="tag" id="card-tag"></div>
    <div class="nm" id="card-name"></div>
    <div class="pitch" id="card-pitch"></div>
    <div class="row"><span>RATE</span><b id="card-rate"></b></div>
    <div class="row"><span>REACH</span><b id="card-reach"></b></div>
    <div class="row"><span>HOPPER</span><b id="card-hopper"></b></div>
    <div class="row"><span>BELT</span><b id="card-pods"></b></div>
  </div>
  <div id="vanessa-says"><span class="who">VANESSA</span><span id="vanessa-line"></span></div>
  <div class="hud" id="bar">
    <button data-booth="0">1 · Blitz</button>
    <button data-booth="1">2 · Pump</button>
    <button data-booth="2">3 · Fan</button>
    <button data-booth="3">4 · Lobber</button>
    <button id="take">Take it to the yard</button>
    <a id="door" href="/">⟵ Back to the war</a>
  </div>
  <script type="module" src="/src/client/vanessas.ts"></script>
</body>
</html>
