<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>War World — Air Program Contact Sheet</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>" />
  <style>
    :root { --ink: #e7ecf2; --muted: #93a0b0; --amber: #e8a33d; }
    * { box-sizing: border-box; }
    html, body { margin: 0; height: 100%; overflow: hidden; background: #14171b; }
    canvas { display: block; }
    #labels { position: fixed; inset: 0; pointer-events: none; }
    .lbl {
      position: absolute; transform: translate(-50%, -50%); text-align: center;
      font: 600 12px/1.3 ui-monospace, "SF Mono", Menlo, Consolas, monospace;
      letter-spacing: -0.01em; color: var(--amber);
      background: rgba(14, 17, 21, 0.78); padding: 4px 8px; border: 1px solid #333b47;
      white-space: nowrap;
    }
    .lbl small { display: block; color: var(--muted); font-weight: 400; font-size: 10px; margin-top: 2px; }
    #hint {
      position: fixed; top: 10px; left: 12px;
      font: 11px ui-monospace, Menlo, Consolas, monospace; color: var(--muted);
      background: rgba(14, 17, 21, 0.8); padding: 5px 9px; border: 1px solid #333b47;
    }
  </style>
</head>
<body>
  <div id="hint">THE NEW AIR PROGRAM · each airframe its own silhouette · near-top-down (command zoom) · noses point up</div>
  <div id="labels"></div>
  <script type="module">
    import * as THREE from 'three';
    import { buildVehicle } from './src/client/models/vehicles.ts';

    const AIR = [
      { kind: 'gunship',        name: 'WARHAWK',  sub: 'gun jet · straight wing' },
      { kind: 'airsuperiority', name: 'SPECTER',  sub: 'fighter · diamond' },
      { kind: 'stealthbomber',  name: 'REAPER',   sub: 'stealth · flying wing' },
      { kind: 'gunheli',        name: 'HYDRA',    sub: 'rocket heli · single rotor' },
    ];

    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x14171b);
    scene.add(new THREE.HemisphereLight(0xcfe3ff, 0x2a2620, 1.0));
    const key = new THREE.DirectionalLight(0xffffff, 1.4);
    key.position.set(6, 14, 8); scene.add(key);
    const rim = new THREE.DirectionalLight(0x8ab6ff, 0.5);
    rim.position.set(-8, 6, -6); scene.add(rim);

    // lay the four airframes in a row, nose up-screen (+X forward → -Z)
    const SPAN = 13;
    const anchors = [];
    AIR.forEach((a, i) => {
      const m = buildVehicle(a.kind, 0);
      m.rotation.y = -Math.PI / 2;              // nose (+X) points up-screen (-Z)
      const x = (i - (AIR.length - 1) / 2) * SPAN;
      m.position.set(x, 0, 0);
      scene.add(m);
      anchors.push(new THREE.Vector3(x, 1.6, 0));
    });

    // near-top-down "command" camera, slight tilt so height reads
    const camY = 18, camZ = 7;
    const cam = new THREE.PerspectiveCamera(34, innerWidth / innerHeight, 0.1, 400);
    const lookAt = new THREE.Vector3(0, 1, 0);
    function place() {
      cam.aspect = innerWidth / innerHeight;
      cam.position.set(0, camY, camZ);
      cam.lookAt(lookAt);
      cam.updateProjectionMatrix();
    }
    place();
    addEventListener('resize', () => { renderer.setSize(innerWidth, innerHeight); place(); syncLabels(); });

    // HTML labels projected under each airframe
    const labelBox = document.getElementById('labels');
    const labels = AIR.map((a) => {
      const d = document.createElement('div');
      d.className = 'lbl';
      d.innerHTML = a.name + '<small>' + a.sub + '</small>';
      labelBox.appendChild(d);
      return d;
    });
    function syncLabels() {
      AIR.forEach((a, i) => {
        const p = anchors[i].clone().project(cam);
        labels[i].style.left = ((p.x * 0.5 + 0.5) * innerWidth) + 'px';
        labels[i].style.top = ((-p.y * 0.5 + 0.5) * innerHeight + 78) + 'px';
      });
    }

    let t = 0;
    function frame() {
      t += 0.016;
      // spin rotors + flicker burners so the animated parts read in the still
      scene.traverse((o) => {
        if (o.name === 'rotorL' || o.name === 'rotorR') o.rotation.y += 0.5;
      });
      renderer.render(scene, cam);
      syncLabels();
      requestAnimationFrame(frame);
    }
    frame();
    window.__sheetReady = true;
  </script>
</body>
</html>
