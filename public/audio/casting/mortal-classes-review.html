<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>War World — Mortal Class VO</title>
  <style>
    :root{color-scheme:dark;--bg:oklch(.16 .025 235);--panel:oklch(.21 .03 235);--line:oklch(.34 .04 235);--text:oklch(.92 .025 85);--muted:oklch(.68 .045 230);--amber:oklch(.76 .16 78);--cyan:oklch(.75 .13 205);--good:oklch(.76 .17 150);--bad:oklch(.69 .19 28)}
    *{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 85% 0,oklch(.25 .06 222),transparent 34rem),var(--bg);color:var(--text);font:14px/1.45 Inter,system-ui,sans-serif}
    header{position:sticky;top:0;z-index:4;padding:18px 24px;border-bottom:1px solid var(--line);background:color-mix(in oklch,var(--bg) 88%,transparent);backdrop-filter:blur(14px)}
    h1{margin:0;font:700 25px/1.1 Georgia,serif;letter-spacing:-.025em}.sub{color:var(--muted);margin-top:6px}
    .controls{display:flex;flex-wrap:wrap;gap:9px;align-items:center;margin-top:14px}button,input,select{font:inherit;color:var(--text);border:1px solid var(--line);border-radius:10px;background:var(--panel);padding:9px 12px}button{cursor:pointer;transition:.2s}button:hover{border-color:var(--amber);box-shadow:0 7px 22px #0006;transform:translateY(-1px)}input[type=search]{min-width:240px}input[type=range]{padding:0;width:125px}
    main{max-width:1120px;margin:auto;padding:20px}.cast{display:grid;grid-template-columns:repeat(auto-fit,minmax(225px,1fr));gap:12px;margin-bottom:20px}.actor,.line{border:1px solid var(--line);border-radius:10px;background:linear-gradient(145deg,var(--panel),oklch(.19 .025 235));box-shadow:0 12px 30px #0002}.actor{padding:14px}.actor strong{color:var(--amber);font-size:15px}.actor small{display:block;color:var(--muted);margin-top:5px}
    .lines{display:grid;gap:10px}.line{display:grid;grid-template-columns:44px minmax(0,1fr) auto;gap:12px;align-items:start;padding:13px}.play{width:40px;height:40px;padding:0;color:var(--cyan)}.slot{font:600 11px/1.2 ui-monospace,monospace;color:var(--cyan);letter-spacing:.04em}.words{font:600 16px/1.35 Georgia,serif;margin:4px 0 6px}.direction{color:var(--muted);font-size:12px}.status{font:700 11px/1 ui-monospace,monospace;padding:6px 8px;border-radius:8px;border:1px solid var(--line)}.ok{color:var(--good)}.off,.err,.missing{color:var(--bad)}.hidden{display:none}#count{color:var(--amber);font-weight:700}
    @media(max-width:650px){header{padding:15px}main{padding:12px}.line{grid-template-columns:40px 1fr}.status{grid-column:2}.controls>*{flex:1}input[type=search]{min-width:100%}}
  </style>
</head>
<body>
  <header>
    <h1>Mortal Class Performance Dossier</h1>
    <div class="sub">Seven operators · approved dialogue · physical acting direction · Whisper tape check</div>
    <div class="controls">
      <button id="play-all">▶ Play visible</button>
      <button id="stop">■ Stop</button>
      <select id="filter"><option value="">All classes</option></select>
      <input id="search" type="search" placeholder="Search line, slot, or actor">
      <label>Volume <input id="volume" type="range" min="0" max="1" value=".85" step=".05"></label>
      <span id="count"></span>
    </div>
  </header>
  <main>
    <section class="cast" id="cast"></section>
    <section class="lines" id="lines"></section>
  </main>
  <script>
    const state={manifest:null,qc:new Map(),audio:null,stopped:false};
    const $=id=>document.getElementById(id);
    const esc=value=>String(value).replace(/[&<>"']/g,ch=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[ch]));
    Promise.all([
      fetch('mortal-classes-manifest.json').then(r=>r.json()),
      fetch('mortal-classes-transcript.json').then(r=>r.ok?r.json():{rows:[]}).catch(()=>({rows:[]})),
    ]).then(([manifest,qc])=>{
      state.manifest=manifest;
      state.qc=new Map((qc.rows||[]).map(row=>[row.slot,row]));
      for(const [id,actor] of Object.entries(manifest.cast)){
        $('filter').insertAdjacentHTML('beforeend','<option value="'+esc(id)+'">'+esc(actor.name)+'</option>');
      }
      renderCast();renderLines();
    });
    function renderCast(){
      $('cast').innerHTML=Object.entries(state.manifest.cast).map(([id,a])=>
        '<article class="actor" data-class="'+esc(id)+'"><strong>'+esc(a.name)+'</strong><small>'+esc(a.role)+' · Gemini '+esc(a.voice)+'</small></article>'
      ).join('');
    }
    function visibleLines(){
      const cls=$('filter').value,q=$('search').value.trim().toLowerCase();
      return state.manifest.lines.filter(line=>(!cls||line.classId===cls)&&(!q||(line.slot+' '+line.text+' '+state.manifest.cast[line.classId].name).toLowerCase().includes(q)));
    }
    function renderLines(){
      const rows=visibleLines();$('count').textContent=rows.length+' lines';
      $('lines').innerHTML=rows.map(line=>{
        const qc=state.qc.get(line.slot),status=qc?.status||'pending';
        return '<article class="line" data-slot="'+esc(line.slot)+'"><button class="play" aria-label="Play">▶</button><div><div class="slot">'+esc(line.slot)+'</div><div class="words">“'+esc(line.text)+'”</div><div class="direction">'+esc(line.scene)+' '+esc(line.notes.join(' '))+'</div></div><span class="status '+status.toLowerCase()+'">'+esc(status)+(qc?' · '+qc.similarity:'')+'</span></article>';
      }).join('');
      document.querySelectorAll('.line .play').forEach(button=>button.onclick=()=>play(button.closest('.line').dataset.slot));
    }
    function play(slot){
      state.stopped=false;if(state.audio)state.audio.pause();
      state.audio=new Audio('../'+slot+'.ogg');state.audio.volume=Number($('volume').value);return state.audio.play().catch(()=>{});
    }
    $('filter').onchange=()=>{renderCast();renderLines()};$('search').oninput=renderLines;
    $('stop').onclick=()=>{state.stopped=true;if(state.audio){state.audio.pause();state.audio.currentTime=0}};
    $('play-all').onclick=async()=>{state.stopped=false;for(const line of visibleLines()){if(state.stopped)break;await new Promise(done=>{play(line.slot);state.audio.onended=done;state.audio.onerror=done})}};
  </script>
</body>
</html>
